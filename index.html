<!DOCTYPE html>
<html lang="en" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRAGON LEGACY | ROYAL ATTIRE</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --gold: #c5a059; /* لون ذهبي مطفي ملكي */
            --dark-bg: #0a0a0a;
            --overlay-pattern: url('https://i.ibb.co/v44m8YmP/image.png'); /* رابط صورة اللوجو بتاعك */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Playfair Display', serif; }
        
        body { background-color: var(--dark-bg); color: #fff; overflow-x: hidden; }

        /* --- 1. Splash Screen --- */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), 
                        var(--overlay-pattern) center/cover no-repeat;
            z-index: 5000; display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: 0.8s ease-in-out;
        }
        .splash-logo { 
            font-family: 'Cinzel', serif; 
            font-size: clamp(2rem, 8vw, 4rem); 
            color: var(--gold); 
            letter-spacing: 12px; 
            text-align: center;
            font-weight: 900;
            text-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .splash-sub {
            font-family: 'Cinzel', serif;
            letter-spacing: 5px;
            font-size: 0.8rem;
            margin-top: 10px;
            margin-bottom: 40px;
            color: #888;
        }

        .enter-btn {
            background: transparent; border: 1px solid var(--gold); color: var(--gold); 
            padding: 18px 60px; font-family: 'Cinzel', serif; font-size: 0.9rem; 
            cursor: pointer; letter-spacing: 4px; transition: 0.5s; position: relative;
            overflow: hidden;
        }
        .enter-btn:hover { background: var(--gold); color: #000; }

        /* --- 2. Navbar --- */
        .navbar { 
            padding: 20px 8%; display: flex; justify-content: space-between; align-items: center; 
            background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(197, 160, 89, 0.2); 
            position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-family: 'Cinzel', serif; font-size: 1.4rem; color: var(--gold); letter-spacing: 3px; text-decoration: none; font-weight: 700; }
        .cart-bolt { position: relative; cursor: pointer; color: var(--gold); font-size: 1.3rem; }
        .badge { position: absolute; top: -8px; right: -12px; background: var(--gold); color: #000; font-size: 0.7rem; padding: 2px 6px; border-radius: 50%; font-weight: bold; }

        /* --- 3. Product Grid --- */
        .container { padding: 40px 5%; display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; max-width: 1300px; margin: 0 auto; }
        
        .card { 
            background: #111; border: 1px solid rgba(197, 160, 89, 0.1); position: relative;
            transition: 0.4s ease; cursor: pointer;
        }
        .card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .img-box { height: 280px; overflow: hidden; background: #050505; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; transition: 0.6s; }
        .card:hover img { opacity: 1; transform: scale(1.08); }
        
        .info-box { padding: 15px; text-align: center; border-top: 1px solid rgba(197, 160, 89, 0.1); }
        .info-box h4 { font-size: 0.85rem; color: #fff; margin-bottom: 8px; font-family: 'Cinzel', serif; letter-spacing: 1px; }
        .price { color: var(--gold); font-weight: 400; font-family: 'Cinzel', serif; font-size: 0.95rem; }

        /* --- 4. Product Overlay --- */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 4000; display: none; overflow-y: auto; }
        
        #overlayBody {
            background: linear-gradient(rgba(0,0,0,0.92), rgba(0,0,0,0.92)), 
                        var(--overlay-pattern) center/cover repeat;
            min-height: 100%;
        }

        .overlay-header { display: flex; justify-content: space-between; align-items: center; padding: 25px 8%; }
        .close-btn { color: var(--gold); font-size: 1.5rem; cursor: pointer; }

        .overlay-content { max-width: 1000px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; padding-bottom: 50px; }
        .overlay-img { width: 90%; max-height: 450px; object-fit: contain; margin-bottom: 30px; filter: drop-shadow(0 0 20px rgba(0,0,0,0.5)); }

        .product-details { width: 90%; text-align: center; }
        .product-title { font-family: 'Cinzel', serif; font-size: 1.8rem; color: var(--gold); margin-bottom: 15px; }
        .product-desc { font-size: 1rem; color: #bbb; line-height: 1.8; margin-bottom: 30px; font-style: italic; }

        /* Sizes */
        .size-options { display: flex; gap: 10px; justify-content: center; margin-bottom: 30px; }
        .size-btn {
            background: transparent; border: 1px solid #444; color: #fff; 
            width: 50px; height: 50px; font-family: 'Cinzel', serif; 
            cursor: pointer; transition: 0.3s;
        }
        .size-btn.active { border-color: var(--gold); color: var(--gold); box-shadow: 0 0 15px rgba(197, 160, 89, 0.3); }

        .add-btn { 
            width: 100%; max-width: 400px; padding: 20px; background: var(--gold); color: #000; 
            border: none; font-family: 'Cinzel', serif; font-weight: bold;
            font-size: 1rem; cursor: pointer; letter-spacing: 3px; transition: 0.3s;
        }
        .add-btn:hover { background: #fff; letter-spacing: 5px; }

        /* Cart Page */
        .cart-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0a0a0a; z-index: 4500; display: none; flex-direction: column; padding: 30px 8%; }
        input, select { width: 100%; padding: 15px; margin-bottom: 15px; background: #151515; color: #fff; border: 1px solid #222; outline: none; }
        input:focus { border-color: var(--gold); }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="splash-logo">DRAGON LEGACY</div>
        <div class="splash-sub">EST. 2024 | ROYAL ATTIRE</div>
        <button class="enter-btn" onclick="closeSplash()">DISCOVER THE LEGACY</button>
    </div>

    <nav class="navbar">
        <a href="#" class="logo">DRAGON LEGACY</a>
        <div class="cart-bolt" onclick="openCart()">
            <i class="fas fa-shopping-bag"></i>
            <span class="badge" id="cartBadge">0</span>
        </div>
    </nav>

    <div class="container" id="productGrid"></div>

    <div class="overlay" id="productOverlay">
        <div id="overlayBody">
            <div class="overlay-header">
                <span class="close-btn" onclick="closeOverlay()"><i class="fas fa-times"></i></span>
                <div class="logo" style="font-size: 1rem;">DRAGON LEGACY</div>
            </div>
            
            <div class="overlay-content">
                <img src="" class="overlay-img" id="overlayProductImg">
                <div class="product-details" id="overlayProductDetails"></div>
            </div>
        </div>
    </div>

    <div class="cart-page" id="cartPage">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:40px;">
            <h2 style="color:var(--gold); font-family:'Cinzel';">YOUR SELECTIONS</h2>
            <i class="fas fa-times" onclick="closeCart()" style="color:var(--gold); font-size:1.5rem; cursor:pointer;"></i>
        </div>
        <div id="cartList" style="flex-grow:1; overflow-y:auto;"></div>
        <div id="totalPrice" style="padding:20px; color:#fff; font-size:1.5rem; text-align:center; font-family: 'Cinzel'; border-top:1px solid #222;"></div>
        
        <form action="https://formspree.io/f/your_unique_id" method="POST">
            <input type="hidden" name="Order_Details" id="orderData">
            <input type="text" name="Name" placeholder="NAME" required>
            <input type="tel" name="Phone" placeholder="WHATSAPP PHONE" required>
            <input type="text" name="Address" placeholder="SHIPPING ADDRESS" required>
            <select name="Payment" id="payMethod" onchange="togglePay()">
                <option value="Cash">CASH ON DELIVERY</option>
                <option value="Vodafone">VODAFONE CASH</option>
            </select>
            <button type="submit" class="add-btn">PLACE ORDER</button>
        </form>
    </div>

    <script>
        const products = [
            { id: 1, name: "EMPEROR POLO - ONYX", price: 1250, img: "polo.jpg", desc: "Crafted with the finest Egyptian cotton, featuring the gold dragon crest.", sizes: ["L", "XL", "2XL"] },
            { id: 2, name: "LEGACY TEE - IVORY", price: 850, img: "tee.jpg", desc: "A timeless piece for the modern ruler. Oversized fit.", sizes: ["XL", "2XL"] },
            { id: 3, name: "SOVEREIGN HOODIE", price: 1850, img: "hoodie.jpg", desc: "Heavyweight fleece lined with silk for ultimate comfort.", sizes: ["L", "XL"] },
            { id: 4, name: "DYNASTY JOGGERS", price: 1150, img: "joggers.jpg", desc: "Gold-tipped drawstrings and tailored silhouette.", sizes: ["M", "L", "XL"] }
        ];

        let cart = [];
        let selectedSize = null;

        function closeSplash() { 
            const splash = document.getElementById('splash-screen');
            splash.style.opacity = '0';
            setTimeout(() => splash.style.display = 'none', 800);
            renderProducts();
        }

        function renderProducts() {
            document.getElementById('productGrid').innerHTML = products.map(p => `
                <div class="card" onclick="viewProduct(${p.id})">
                    <div class="img-box"><img src="${p.img}" onerror="this.src='https://via.placeholder.com/400x500/0a0a0a/c5a059?text=LEGACY'"></div>
                    <div class="info-box">
                        <h4>${p.name}</h4>
                        <div class="price">${p.price} EGP</div>
                    </div>
                </div>
            `).join('');
        }

        function viewProduct(id) {
            const p = products.find(i => i.id === id);
            document.getElementById('overlayProductImg').src = p.img;
            selectedSize = null;

            const sizeHtml = p.sizes.map(size => `
                <button class="size-btn" onclick="selectSize(this, '${size}')">${size}</button>
            `).join('');

            document.getElementById('overlayProductDetails').innerHTML = `
                <h1 class="product-title">${p.name}</h1>
                <p class="product-desc">${p.desc}</p>
                <div class="size-options">${sizeHtml}</div>
                <div class="price" style="font-size:1.8rem; margin-bottom:20px;">${p.price} EGP</div>
                <button class="add-btn" onclick="tryAddToCart(${p.id});">ADD TO COLLECTION</button>
            `;
            document.getElementById('productOverlay').style.display = 'block';
        }

        function selectSize(btn, size) {
            document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedSize = size;
        }

        function tryAddToCart(id) {
            if(!selectedSize) { alert("Please select your size."); return; }
            const p = products.find(i => i.id === id);
            cart.push({...p, selectedSize: size = selectedSize});
            updateCart();
            closeOverlay();
        }

        function updateCart() {
            document.getElementById('cartBadge').innerText = cart.length;
            let total = 0;
            document.getElementById('cartList').innerHTML = cart.map((item, index) => {
                total += item.price;
                return `<div style="display:flex; justify-content:space-between; align-items:center; padding:20px 0; border-bottom:1px solid #111;">
                    <div>
                        <div style="font-family:'Cinzel'; color:var(--gold);">${item.name}</div>
                        <div style="font-size:0.8rem; color:#888;">SIZE: ${item.selectedSize}</div>
                    </div>
                    <div style="color:#fff;">${item.price} EGP</div>
                    <i class="fas fa-times" onclick="removeFromCart(${index})" style="color:#444; cursor:pointer;"></i>
                </div>`;
            }).join('');
            document.getElementById('totalPrice').innerText = "TOTAL: " + total + " EGP";
            document.getElementById('orderData').value = cart.map(i => `${i.name} (${i.selectedSize})`).join(', ') + ` | Total: ${total}`;
        }

        function removeFromCart(index) { cart.splice(index, 1); updateCart(); }
        function openCart() { if(cart.length > 0) document.getElementById('cartPage').style.display = 'flex'; else alert('Your collection is empty.'); }
        function closeCart() { document.getElementById('cartPage').style.display = 'none'; }
        function closeOverlay() { document.getElementById('productOverlay').style.display = 'none'; }

        renderProducts();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRAGON LEGACY | LUXURY STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --gold: #d4af37; 
            --dark-bg: #000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { background-color: var(--dark-bg); color: #fff; overflow-x: hidden; }

        /* --- 1. Splash Screen --- */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            /* الرابط المباشر للصورة لضمان الظهور */
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.7)), 
                        url('https://i.ibb.co/v44m8YmP/image.png') center/cover no-repeat;
            z-index: 5000; display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center;
        }

        .splash-logo { 
            font-family: 'Cinzel', serif; 
            font-size: clamp(1.8rem, 8vw, 3.2rem); 
            color: var(--gold); 
            letter-spacing: 6px; 
            margin-bottom: 40px; 
            font-weight: 700;
            line-height: 1.3;
            text-transform: uppercase;
        }

        /* زرار Shop Now المستطيل الشفاف */
        .enter-btn {
            background: transparent; 
            border: 1px solid var(--gold); 
            color: var(--gold); 
            padding: 14px 50px; 
            font-family: 'Cinzel', serif; 
            font-size: 0.8rem; 
            cursor: pointer; 
            letter-spacing: 4px; 
            transition: 0.4s;
            text-transform: uppercase;
        }
        .enter-btn:hover { background: rgba(212, 175, 55, 0.15); }

        /* --- 2. Navbar (لوجو DL وتحته الاسم كامل في النص) --- */
        .navbar { 
            padding: 10px 5%; display: flex; justify-content: space-between; align-items: center; 
            background: #000; border-bottom: 1px solid rgba(212,175,55,0.1); 
            position: sticky; top: 0; z-index: 1000;
        }

        .brand-header { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .dl-text { font-family: 'Cinzel', serif; font-size: 1.8rem; color: var(--gold); font-weight: 900; line-height: 1; }
        .full-name { font-family: 'Cinzel', serif; font-size: 0.5rem; color: #888; letter-spacing: 2px; margin-top: 4px; }

        .cart-bolt { position: relative; cursor: pointer; color: var(--gold); font-size: 1.3rem; min-width: 40px; text-align: right; }
        .badge { position: absolute; top: -5px; right: -5px; background: var(--gold); color: #000; font-size: 0.6rem; padding: 2px 5px; border-radius: 50%; font-weight: bold; }

        /* --- 3. Grid --- */
        .container { padding: 30px 4%; display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; max-width: 1200px; margin: 0 auto; }
        .card { background: #080808; border: 1px solid #151515; cursor: pointer; }
        .img-box { height: 220px; overflow: hidden; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
        .info-box { padding: 12px; text-align: center; }
        .info-box h4 { font-size: 0.75rem; font-family: 'Cinzel', serif; color: #fff; letter-spacing: 1px; }
        .price { color: var(--gold); font-size: 0.85rem; margin-top: 5px; font-family: 'Cinzel', serif; font-weight: bold; }

        /* --- 4. Overlay --- */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 4000; display: none; overflow-y: auto; }
        .overlay-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; border-bottom: 1px solid #111; }
        .close-btn { color: var(--gold); font-size: 1.5rem; cursor: pointer; min-width: 40px; }
        .overlay-content { padding: 30px 20px; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .overlay-img { width: 100%; max-width: 350px; margin-bottom: 20px; }
        
        .add-btn { width: 100%; max-width: 300px; padding: 18px; border: 1px solid var(--gold); background: transparent; color: var(--gold); font-family: 'Cinzel'; cursor: pointer; letter-spacing: 3px; }
        .add-btn:hover { background: var(--gold); color: #000; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="splash-logo">DRAGON<br>LEGACY</div>
        <button class="enter-btn" onclick="closeSplash()">SHOP NOW</button>
    </div>

    <nav class="navbar">
        <div style="min-width: 40px;"></div> <div class="brand-header">
            <span class="dl-text">DL</span>
            <span class="full-name">DRAGON LEGACY</span>
        </div>
        <div class="cart-bolt">
            <i class="fas fa-shopping-bag"></i>
            <span class="badge" id="cartBadge">0</span>
        </div>
    </nav>

    <div class="container" id="productGrid">
        </div>

    <div class="overlay" id="productOverlay">
        <div class="overlay-header">
            <span class="close-btn" onclick="closeOverlay()"><i class="fas fa-times"></i></span>
            <div class="brand-header">
                <span class="dl-text" style="font-size: 1.2rem;">DL</span>
                <span class="full-name" style="font-size: 0.4rem;">DRAGON LEGACY</span>
            </div>
            <div style="min-width: 40px;"></div>
        </div>
        <div class="overlay-content" id="overlayBody"></div>
    </div>

    <script>
        const products = [
            { id: 1, name: "ROYAL POLO - BLACK", price: 1250, img: "https://via.placeholder.com/400x500/000/d4af37?text=DRAGON+POLO" },
            { id: 2, name: "LEGACY TEE - WHITE", price: 850, img: "https://via.placeholder.com/400x500/000/d4af37?text=DRAGON+TEE" }
        ];

        function closeSplash() {
            const splash = document.getElementById('splash-screen');
            splash.style.transition = '0.6s';
            splash.style.opacity = '0';
            setTimeout(() => {
                splash.style.display = 'none';
                renderProducts();
            }, 600);
        }

        function renderProducts() {
            document.getElementById('productGrid').innerHTML = products.map(p => `
                <div class="card" onclick="viewProduct(${p.id})">
                    <div class="img-box"><img src="${p.img}"></div>
                    <div class="info-box">
                        <h4>${p.name}</h4>
                        <div class="price">${p.price} EGP</div>
                    </div>
                </div>
            `).join('');
        }

        function viewProduct(id) {
            const p = products.find(i => i.id === id);
            document.getElementById('overlayBody').innerHTML = `
                <img src="${p.img}" class="overlay-img">
                <h1 style="font-family:'Cinzel'; margin-bottom:10px; color:#fff;">${p.name}</h1>
                <div class="price" style="font-size:1.5rem; margin-bottom:20px;">${p.price} EGP</div>
                <button class="add-btn">ADD TO COLLECTION</button>
            `;
            document.getElementById('productOverlay').style.display = 'block';
        }

        function closeOverlay() { document.getElementById('productOverlay').style.display = 'none'; }
    </script>
</body>
</html>

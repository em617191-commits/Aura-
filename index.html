<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA | LUXURY STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --gold: #d4af37; --dark: #000; --dark-gray: rgba(10, 10, 10, 0.85); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        
        body { 
            /* خلفية الصفحة الرئيسية - الصورة اللي بعتها */
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)), 
                        url('https://i.ibb.co/pjGR2hd9/pattern.jpg') center/cover no-repeat fixed;
            color: #fff; 
            overflow-x: hidden; 
        }

        /* 1. Splash Screen - خلفية مستقلة لزوم الانبهار */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://i.ibb.co/pjGR2hd9/pattern.jpg') center/cover no-repeat;
            z-index: 5000; display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .splash-logo { font-family: 'Cinzel'; font-size: 4rem; color: var(--gold); letter-spacing: 15px; margin-bottom: 30px; text-shadow: 0 0 30px rgba(212,175,55,0.5); }

        /* 2. الستور */
        .navbar { 
            padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; 
            background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--gold); 
            position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-family: 'Cinzel'; font-size: 1.5rem; color: var(--gold); }
        .cart-bolt { position: relative; cursor: pointer; color: var(--gold); font-size: 1.5rem; }
        .badge { position: absolute; top: -5px; right: -12px; background: red; color: #fff; font-size: 0.7rem; padding: 2px 6px; border-radius: 50%; }

        /* Grid العرض (عمودين) */
        .container { padding: 40px 4%; display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; max-width: 1200px; margin: 0 auto; }
        
        .card { 
            background: var(--dark-gray); /* خلفية شبه شفافة للكروت */
            border: 1px solid rgba(212,175,55,0.1); border-radius: 8px; overflow: hidden; 
            transition: 0.3s; cursor: pointer;
        }
        .card:hover { border-color: var(--gold); transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .img-box { height: 200px; background: #000; overflow: hidden; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .card:hover img { transform: scale(1.1); }
        .info-box { padding: 15px; text-align: center; }
        .info-box h4 { font-size: 0.95rem; color: #eee; margin-bottom: 5px; }
        .price { color: var(--gold); font-weight: 900; }

        /* Buttons & Overlays */
        .add-btn { width: 100%; padding: 12px; background: var(--gold); color: #000; border: none; font-weight: 900; cursor: pointer; border-radius: 4px; transition: 0.3s; }
        .add-btn:hover { background: #fff; }
        
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 4000; display: none; overflow-y: auto; }
        .close-btn { position: absolute; top: 20px; left: 20px; color: var(--gold); font-size: 2rem; cursor: pointer; }

        /* Cart Page */
        .cart-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 4500; display: none; flex-direction: column; padding: 20px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; background: #111; color: #fff; border: 1px solid #333; border-radius: 4px; }
        .vodafone-box { display: none; padding: 15px; border: 1px dashed var(--gold); margin-bottom: 15px; background: #080808; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="splash-logo">AURA</div>
        <button class="add-btn" style="width:auto; padding:15px 50px; font-size:1.1rem; border-radius: 0;" onclick="closeSplash()">ENTER STORE</button>
    </div>

    <nav class="navbar">
        <div class="logo">AURA</div>
        <div class="cart-bolt" onclick="openCart()">
            <i class="fas fa-shopping-bag"></i>
            <span class="badge" id="cartBadge">0</span>
        </div>
    </nav>

    <div class="container" id="productGrid"></div>

    <div class="overlay" id="productOverlay">
        <span class="close-btn" onclick="closeOverlay()"><i class="fas fa-times"></i></span>
        <div id="overlayBody" style="text-align:right;"></div>
    </div>

    <div class="cart-page" id="cartPage">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="color:var(--gold);">سلة المشتريات 🛍️</h2>
            <i class="fas fa-times" onclick="closeCart()" style="color:var(--gold); font-size:1.5rem; cursor:pointer;"></i>
        </div>
        <div id="cartList" style="flex-grow:1; overflow-y:auto; padding:10px 0;"></div>
        <div id="totalPrice" style="padding:20px; color:var(--gold); font-size:1.5rem; text-align:center; font-weight:bold;"></div>
        
        <form action="https://formspree.io/f/xjgjkvqv" method="POST">
            <input type="hidden" name="Order_Details" id="orderData">
            <input type="text" name="Name" placeholder="الاسم الكامل" required>
            <input type="tel" name="Phone" placeholder="رقم الواتساب" required>
            <input type="text" name="Address" placeholder="العنوان بالتفصيل" required>
            <select name="Payment" id="payMethod" onchange="togglePay()">
                <option value="Cash">دفع عند الاستلام</option>
                <option value="Vodafone">فودافون كاش</option>
            </select>
            <div id="vodafoneBox" class="vodafone-box">تحويل لـ: <b style="color:var(--gold)">01018758798</b></div>
            <button type="submit" class="add-btn" style="font-size:1.1rem;">تأكيد الطلب 🚀</button>
        </form>
    </div>

    <script>
        // لستة المنتجات - عدل الصور والأسماء والأسعار هنا
        const products = [
            { id: 1, name: "SIGNATURE POLO - BLACK", price: 1250, img: "polo.jpg", desc: "خامة بريميوم تقفيل عالى." },
            { id: 2, name: "LUXURY TEE - WHITE", price: 850, img: "tee.jpg", desc: "قطن 100% مريح جداً." },
            { id: 3, name: "AURA CLASSIC HOODIE", price: 1800, img: "hoodie.jpg", desc: "ثقيل ومناسب للشتاء." },
            { id: 4, name: "PREMIUM JOGGERS", price: 1100, img: "joggers.jpg", desc: "مريح جداً للتمارين." }
        ];

        let cart = [];

        function closeSplash() { 
            const splash = document.getElementById('splash-screen');
            splash.style.opacity = '0';
            setTimeout(() => splash.style.display = 'none', 500);
            renderProducts();
        }

        function renderProducts() {
            document.getElementById('productGrid').innerHTML = products.map(p => `
                <div class="card" onclick="viewProduct(${p.id})">
                    <div class="img-box"><img src="${p.img}" onerror="this.src='https://via.placeholder.com/300x300/000/d4af37?text=AURA'"></div>
                    <div class="info-box">
                        <h4>${p.name}</h4>
                        <div class="price">${p.price} EGP</div>
                    </div>
                </div>
            `).join('');
        }

        function viewProduct(id) {
            const p = products.find(i => i.id === id);
            document.getElementById('overlayBody').innerHTML = `
                <img src="${p.img}" onerror="this.src='https://via.placeholder.com/600x400/000/d4af37?text=AURA'" style="width:100%; height:350px; object-fit:cover; border-bottom: 2px solid var(--gold);">
                <div style="padding:25px;">
                    <h2 style="color:var(--gold); font-family:'Cinzel';">${p.name}</h2>
                    <p style="margin:20px 0; color:#ccc; line-height:1.6;">${p.desc}</p>
                    <div class="price" style="font-size:1.8rem; margin-bottom:25px;">${p.price} EGP</div>
                    <button class="add-btn" onclick="addToCart(${p.id}); closeOverlay();">إضافة للسلة 🛍️</button>
                </div>
            `;
            document.getElementById('productOverlay').style.display = 'block';
        }

        function addToCart(id) {
            cart.push(products.find(p => p.id === id));
            updateCart();
            // تنبيه خفيف بدل الـ alert البايخة
            const btn = document.querySelector('.cart-bolt');
            btn.style.transform = 'scale(1.2)';
            setTimeout(() => btn.style.transform = 'scale(1)', 200);
        }

        function updateCart() {
            document.getElementById('cartBadge').innerText = cart.length;
            let total = 0;
            document.getElementById('cartList').innerHTML = cart.map((item, index) => {
                total += item.price;
                return `<div style="display:flex; justify-content:space-between; align-items:center; padding:15px; border-bottom:1px solid #222; background:rgba(255,255,255,0.02);">
                    <div>
                        <div style="font-weight:bold; color:#fff;">${item.name}</div>
                        <div style="color:var(--gold);">${item.price} EGP</div>
                    </div>
                    <i class="fas fa-trash" onclick="removeFromCart(${index})" style="color:#555; cursor:pointer;"></i>
                </div>`;
            }).join('');
            document.getElementById('totalPrice').innerText = "الإجمالي: " + total + " EGP";
            // تجهيز البيانات للفورم بشكل مقروء
            document.getElementById('orderData').value = cart.map(i => `${i.name} (${i.price})`).join(', ') + ` | المجموع: ${total}`;
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCart();
        }

        function togglePay() {
            document.getElementById('vodafoneBox').style.display = (document.getElementById('payMethod').value === 'Vodafone') ? 'block' : 'none';
        }

        function openCart() { 
            if(cart.length > 0) document.getElementById('cartPage').style.display = 'flex'; 
            else alert('السلة فارغة، ضيف منتجات الأول 😉'); 
        }
        function closeCart() { document.getElementById('cartPage').style.display = 'none'; }
        function closeOverlay() { document.getElementById('productOverlay').style.display = 'none'; }

        // تشغيل الـ Grid في الخلفية عشان تظهر ورا الـ Splash
        renderProducts();
    </script>
</body>
</html>

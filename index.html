<!DOCTYPE html>
<html lang="en" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRAGON LEGACY | LUXURY STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --gold: #d4af37; /* لون الذهب الملكي الأصل */
            --dark-bg: #000;
            --gray-text: #888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Playfair Display', serif; }
        
        body { background-color: var(--dark-bg); color: #fff; overflow-x: hidden; }

        /* --- 1. Splash Screen - التصميم الأصلي مع خلفية جديدة --- */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            /* وضع الصورة الجديدة كخلفية */
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.85)), 
                        url('https://i.ibb.co/v44m8YmP/image.png') center/cover no-repeat;
            z-index: 5000; display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: 0.8s ease-in-out;
        }
        /* الاسم في الشاشة الافتتاحية */
        .splash-logo { font-family: 'Cinzel', serif; font-size: clamp(3rem, 10vw, 5.5rem); color: var(--gold); letter-spacing: 15px; margin-bottom: 50px; text-shadow: 0 0 30px rgba(212,175,55,0.4); font-weight: 700; }

        /* زر دخول ملوكي شفاف (كما في التصميم الأصلي) */
        .enter-btn {
            background: transparent; border: 1px solid var(--gold); color: var(--gold); 
            padding: 20px 70px; font-family: 'Cinzel', serif; font-size: 1rem; 
            cursor: pointer; border-radius: 0; letter-spacing: 6px; transition: 0.5s; outline: none;
        }
        .enter-btn:hover { background: var(--gold); color: #000; box-shadow: 0 0 30px rgba(212, 175, 55, 0.5); }

        /* --- 2. الستور --- */
        .navbar { 
            padding: 10px 5%; display: flex; justify-content: space-between; align-items: center; 
            background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(212,175,55,0.2); 
            position: sticky; top: 0; z-index: 1000;
        }

        /* تنسيق اللوجو DL مع الاسم تحته */
        .brand-logo-container { text-align: center; text-decoration: none; display: flex; flex-direction: column; align-items: center; }
        .logo-dl { font-family: 'Cinzel', serif; font-size: 2rem; color: var(--gold); letter-spacing: -2px; font-weight: 900; line-height: 1; }
        .logo-name { font-family: 'Cinzel', serif; font-size: 0.6rem; color: #aaa; letter-spacing: 3px; text-transform: uppercase; margin-top: 2px; }

        .cart-bolt { position: relative; cursor: pointer; color: var(--gold); font-size: 1.5rem; transition: 0.2s; }
        .badge { position: absolute; top: -5px; right: -12px; background: #c19b2a; color: #000; font-size: 0.7rem; padding: 2px 6px; border-radius: 50%; font-weight: bold; }

        /* Grid العرض (عمودين - التصميم الأصلي) */
        .container { padding: 40px 4%; display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; max-width: 1200px; margin: 0 auto; }
        
        .card { 
            background: rgba(10, 10, 10, 0.9); border: 1px solid rgba(212,175,55,0.1); border-radius: 4px; overflow: hidden; 
            transition: 0.3s; cursor: pointer;
        }
        .card:hover { border-color: var(--gold); transform: translateY(-3px); }
        .img-box { height: 220px; background: #000; overflow: hidden; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; opacity: 0.9; }
        .card:hover img { transform: scale(1.05); opacity: 1; }
        .info-box { padding: 15px; text-align: center; }
        .info-box h4 { font-size: 0.9rem; color: #eee; margin-bottom: 5px; font-family: 'Cinzel', serif; letter-spacing: 1px; }
        .price { color: var(--gold); font-weight: 700; font-family: 'Cinzel', serif; font-size: 1rem; }

        /* --- 3. الأوفرلاي (صفحة المنتج - التصميم الأصلي) --- */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 4000; display: none; overflow-y: auto; }
        
        /* خلفية الأوفرلاي بنقوش هادئة (كما في الأصلي) */
        #overlayBody {
            background: linear-gradient(rgba(0,0,0,0.95), rgba(0,0,0,0.95)), 
                        url('https://i.ibb.co/v44m8YmP/image.png') center/cover no-repeat;
            min-height: 100%; display: flex; flex-direction: column;
        }

        .overlay-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; border-bottom: 1px solid rgba(212,175,55,0.2); }
        .close-btn { color: var(--gold); font-size: 1.8rem; cursor: pointer; }

        .overlay-img-container { text-align: center; padding: 20px; border-bottom: 1px solid rgba(212,175,55,0.1); }
        .overlay-img { width: 100%; max-height: 400px; object-fit: contain; filter: drop-shadow(0 0 15px rgba(0,0,0,0.5)); }

        .product-details { padding: 30px 5%; text-align: right; }
        .product-title { font-family: 'Cinzel', serif; font-size: 1.8rem; color: #fff; margin-bottom: 10px; }
        .product-desc { font-size: 0.95rem; color: var(--gray-text); line-height: 1.6; margin-bottom: 25px; }
        .product-price { font-family: 'Cinzel', serif; font-size: 2.2rem; color: var(--gold); margin-bottom: 30px; }

        /* --- 4. ستايل خانة المقاسات (Sizes - التصميم الأصلي) --- */
        .size-section { margin-bottom: 40px; text-align: right; }
        .section-title { font-size: 1rem; color: #fff; margin-bottom: 15px; letter-spacing: 2px; text-transform: uppercase; }
        .size-options { display: flex; gap: 15px; justify-content: flex-start; }
        .size-btn {
            background: transparent; border: 1px solid rgba(212,175,55,0.3); color: var(--gold); 
            padding: 15px 30px; font-family: 'Cinzel', serif; font-size: 1.1rem; 
            cursor: pointer; border-radius: 0; transition: 0.3s; outline: none;
        }
        .size-btn:hover, .size-btn.active { background: var(--gold); color: #000; border-color: var(--gold); box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); }

        /* --- 5. زرار السلة الإنجليزي (English Black Gold - التصميم الأصلي) --- */
        .add-btn { 
            width: 100%; padding: 18px; background: #000; color: var(--gold); 
            border: 1px solid var(--gold); font-family: 'Cinzel', serif;
            font-size: 1.1rem; cursor: pointer; border-radius: 0; letter-spacing: 4px; transition: 0.3s;
        }
        .add-btn:hover { background: var(--gold); color: #000; box-shadow: 0 0 25px rgba(212, 175, 55, 0.5); }

        /* Cart Page */
        .cart-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 4500; display: none; flex-direction: column; padding: 20px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; background: #111; color: #fff; border: 1px solid #333; border-radius: 0; outline: none; }
        input:focus { border-color: var(--gold); }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="splash-logo">AURA</div>
        <button class="enter-btn" onclick="closeSplash()">SHOP NOW</button>
    </div>

    <nav class="navbar">
        <a href="#" class="brand-logo-container">
            <div class="logo-dl">DL</div>
            <div class="logo-name">DRAGON LEGACY</div>
        </a>
        <div class="cart-bolt" onclick="openCart()">
            <i class="fas fa-shopping-bag"></i>
            <span class="badge" id="cartBadge">0</span>
        </div>
    </nav>

    <div class="container" id="productGrid">
        </div>

    <div class="overlay" id="productOverlay">
        <div id="overlayBody">
            <div class="overlay-header">
                <span class="close-btn" onclick="closeOverlay()"><i class="fas fa-times"></i></span>
                <div class="brand-logo-container">
                    <div class="logo-dl" style="font-size: 1.2rem;">DL</div>
                    <div class="logo-name" style="font-size: 0.5rem; letter-spacing: 2px;">DRAGON LEGACY</div>
                </div>
            </div>
            
            <div class="overlay-img-container">
                <img src="" onerror="this.src='https://via.placeholder.com/600x400/000/d4af37?text=LEGACY'" class="overlay-img" id="overlayProductImg">
            </div>

            <div class="product-details" id="overlayProductDetails">
                </div>
        </div>
    </div>

    <div class="cart-page" id="cartPage">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
            <h2 style="color:var(--gold); font-family:'Cinzel';">Cart 🛍️</h2>
            <i class="fas fa-times" onclick="closeCart()" style="color:var(--gold); font-size:1.5rem; cursor:pointer;"></i>
        </div>
        <div id="cartList" style="flex-grow:1; overflow-y:auto; padding:10px 0;"></div>
        <div id="totalPrice" style="padding:20px; color:#fff; font-size:1.6rem; text-align:center; font-weight:bold; font-family: 'Cinzel', serif; border-top:1px solid #222;"></div>
        
        <form action="https://formspree.io/f/your_unique_id" method="POST">
            <input type="hidden" name="Order_Details" id="orderData">
            <input type="text" name="Name" placeholder="Full Name" required>
            <input type="tel" name="Phone" placeholder="Phone Number (WhatsApp)" required>
            <input type="text" name="Address" placeholder="Detailed Address" required>
            <select name="Payment" id="payMethod">
                <option value="Cash">Cash on Delivery</option>
                <option value="Vodafone">Vodafone Cash</option>
            </select>
            <button type="submit" class="add-btn">CONFIRM ORDER 🚀</button>
        </form>
    </div>

    <script>
        const products = [
            { id: 1, name: "LEGACY POLO - BLACK", price: 1250, img: "polo.jpg", desc: "Premium Piqué cotton with the signature gold dragon emblem.", sizes: ["L", "XL", "2XL"] },
            { id: 2, name: "DRAGON TEE - WHITE", price: 850, img: "tee.jpg", desc: "100% combed cotton, oversized fit for comfort.", sizes: ["XL", "2XL"] },
            { id: 3, name: "ROYAL HOODIE - ONYX", price: 1800, img: "hoodie.jpg", desc: "Heavyweight fleece with silk-screened graphics.", sizes: ["L", "XL"] },
            { id: 4, name: "DYNASTY JOGGERS", price: 1100, img: "joggers.jpg", desc: "Tailored fit with ribbed cuffs and gold hardware.", sizes: ["M", "L", "XL"] }
        ];

        let cart = [];
        let selectedSize = null;

        function closeSplash() { 
            const splash = document.getElementById('splash-screen');
            splash.style.opacity = '0';
            setTimeout(() => splash.style.display = 'none', 800);
            renderProducts();
        }

        function renderProducts() {
            document.getElementById('productGrid').innerHTML = products.map(p => `
                <div class="card" onclick="viewProduct(${p.id})">
                    <div class="img-box"><img src="${p.img}" onerror="this.src='https://via.placeholder.com/300x300/000/d4af37?text=LEGACY'"></div>
                    <div class="info-box">
                        <h4>${p.name}</h4>
                        <div class="price">${p.price} EGP</div>
                    </div>
                </div>
            `).join('');
        }

        function viewProduct(id) {
            const p = products.find(i => i.id === id);
            document.getElementById('overlayProductImg').src = p.img;
            selectedSize = null;

            const sizeHtml = p.sizes.map(size => `
                <button class="size-btn" onclick="selectSize(this, '${size}')">${size}</button>
            `).join('');

            document.getElementById('overlayProductDetails').innerHTML = `
                <h1 class="product-title">${p.name}</h1>
                <p class="product-desc">${p.desc}</p>
                
                <div class="size-section">
                    <h3 class="section-title">Select Size</h3>
                    <div class="size-options">
                        ${sizeHtml}
                    </div>
                </div>

                <div class="product-price">${p.price} EGP</div>
                
                <button class="add-btn" onclick="tryAddToCart(${p.id});">ADD TO CART 🛍️</button>
            `;
            document.getElementById('productOverlay').style.display = 'block';
        }

        function selectSize(btn, size) {
            document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedSize = size;
        }

        function tryAddToCart(id) {
            if(!selectedSize) { alert("Please select a size ❗"); return; }
            addToCart(id, selectedSize);
            closeOverlay();
        }

        function addToCart(id, size) {
            const p = products.find(i => i.id === id);
            cart.push({...p, selectedSize: size});
            updateCart();
            const btn = document.querySelector('.cart-bolt');
            btn.style.transform = 'scale(1.2)';
            setTimeout(() => btn.style.transform = 'scale(1)', 200);
        }

        function updateCart() {
            document.getElementById('cartBadge').innerText = cart.length;
            let total = 0;
            document.getElementById('cartList').innerHTML = cart.map((item, index) => {
                total += item.price;
                return `<div style="display:flex; justify-content:space-between; align-items:center; padding:15px; border-bottom:1px solid #111; background:rgba(255,255,255,0.01);">
                    <div>
                        <div style="font-weight:bold; color:#fff; font-family:'Cinzel';">${item.name} (${item.selectedSize})</div>
                        <div style="color:var(--gold);">${item.price} EGP</div>
                    </div>
                    <i class="fas fa-trash" onclick="removeFromCart(${index})" style="color:#444; cursor:pointer;"></i>
                </div>`;
            }).join('');
            document.getElementById('totalPrice').innerText = total + " EGP";
            document.getElementById('orderData').value = cart.map(i => `${i.name} - ${i.selectedSize} (${i.price})`).join(', ') + ` | Total: ${total}`;
        }

        function removeFromCart(index) { cart.splice(index, 1); updateCart(); }
        function openCart() { if(cart.length > 0) document.getElementById('cartPage').style.display = 'flex'; else alert('Cart is empty.'); }
        function closeCart() { document.getElementById('cartPage').style.display = 'none'; }
        function closeOverlay() { document.getElementById('productOverlay').style.display = 'none'; }

        renderProducts();
    </script>
</body>
</html>

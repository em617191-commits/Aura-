<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA | القوة والتميز</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Cinzel:wght@400;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --gold: #d4af37;
            --dark-bg: #0a0a0a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background-color: var(--dark-bg); color: #fff; overflow-x: hidden; }

        /* --- 1. Splash Screen --- */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('pattern-bg.png') center/cover no-repeat;
            display: flex; justify-content: center; align-items: center;
            z-index: 2000; transition: opacity 1.2s ease, visibility 1.2s;
        }
        .splash-content { text-align: center; }
        .logo-text { font-family: 'Cinzel', serif; font-size: clamp(3rem, 10vw, 5rem); color: var(--gold); letter-spacing: 15px; margin-bottom: 20px; }
        
        /* --- 2. Store Styles (Hero Style Integration) --- */
        #main-content { display: none; opacity: 0; transition: 1s; }

        .navbar { 
            padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; 
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); position: sticky; top: 0; 
            z-index: 1000; border-bottom: 1px solid var(--gold);
        }
        .logo { font-family: 'Cinzel', serif; font-size: 1.8rem; color: var(--gold); letter-spacing: 5px; }
        
        .cart-bolt { position: relative; cursor: pointer; color: var(--gold); font-size: 1.5rem; }
        .badge { position: absolute; top: -5px; right: -12px; background: #ff4444; color: #fff; font-size: 0.7rem; padding: 2px 6px; border-radius: 50%; }

        .brand-header { text-align: center; padding: 40px 20px; }
        .brand-header h1 { font-family: 'Cinzel', serif; font-size: 3rem; color: var(--gold); letter-spacing: 10px; }

        /* Grid Layout like Hero Store */
        .container { padding: 20px 4%; display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; max-width: 1200px; margin: 0 auto; }
        
        .card { 
            background: #111; border-radius: 4px; overflow: hidden; 
            border: 1px solid rgba(212, 175, 55, 0.1); transition: 0.3s; cursor: pointer; 
        }
        .card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .img-box { height: 220px; overflow: hidden; background: #000; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .card:hover img { transform: scale(1.1); }
        
        .info-box { padding: 15px; text-align: center; }
        .info-box h3 { font-size: 1rem; margin-bottom: 8px; letter-spacing: 1px; color: #eee; }
        .price { color: var(--gold); font-weight: 700; font-family: 'Playfair Display', serif; font-size: 1.1rem; }

        .add-btn { 
            width: 80%; padding: 12px; background: transparent; color: var(--gold); 
            border: 1px solid var(--gold); border-radius: 0; font-family: 'Cinzel';
            font-size: 0.9rem; cursor: pointer; margin-top: 30px; letter-spacing: 3px;
        }
        .add-btn:hover { background: var(--gold); color: #000; }

        /* Overlay & Cart (Reuse from Hero Store logic if needed) */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 3000; display: none; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="splash-content">
            <h1 class="logo-text">AURA</h1>
            <button class="add-btn" onclick="enterStore()">SHOP NOW</button>
        </div>
    </div>

    <div id="main-content">
        <nav class="navbar">
            <div class="logo">AURA</div>
            <div class="cart-bolt">
                <i class="fas fa-shopping-bag"></i>
                <span class="badge" id="cartBadge">0</span>
            </div>
        </nav>

        <div class="brand-header">
            <h1>AURA COLLECTION</h1>
        </div>

        <div class="container" id="productGrid">
            </div>
    </div>

    <script>
        const products = [
            { id: 1, name: "SIGNATURE POLO - BLACK", price: 1250, img: "polo-black.jpg" },
            { id: 2, name: "LUXURY TEE - WHITE", price: 850, img: "tee-white.jpg" },
            { id: 3, name: "PREMIUM HOODIE", price: 1800, img: "hoodie.jpg" },
            { id: 4, name: "GOLDEN EDITION TEE", price: 950, img: "tee-gold.jpg" }
        ];

        function enterStore() {
            const splash = document.getElementById('splash-screen');
            const main = document.getElementById('main-content');
            
            splash.style.opacity = '0';
            setTimeout(() => {
                splash.style.display = 'none';
                main.style.display = 'block';
                setTimeout(() => main.style.opacity = '1', 50);
                renderProducts();
            }, 1200);
        }

        function renderProducts() {
            document.getElementById('productGrid').innerHTML = products.map(p => `
                <div class="card">
                    <div class="img-box"><img src="${p.img}" onerror="this.src='https://via.placeholder.com/300x400/111/d4af37?text=AURA'"></div>
                    <div class="info-box">
                        <h3>${p.name}</h3>
                        <div class="price">${p.price} EGP</div>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
